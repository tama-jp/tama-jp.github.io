<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- アドレスバー等のブラウザのUIを非表示 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<!-- default（Safariと同じ） / black（黒） / black-translucent（ステータスバーをコンテンツに含める） -->
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<!-- ホーム画面に表示されるアプリ名 -->
<meta name="apple-mobile-web-app-title" content="TAP10">
<!-- ホーム画面に表示されるアプリアイコン -->
<link rel="apple-touch-icon" href="https://tama-jp.github.io/tap/icons/icon-152x152.png">

<title>TAP10</title>
<link rel="stylesheet" type="text/css" href="app.css">
</head>
<body>

<section class="container">
  <h1 class="title">10秒で何回タップできるか</h1>
  <button id="js-tapBtn" class="btn-tap" disabled>
    <span id="js-count"></span><br>タップ!!
  </button>
  <div class="time">残り時間 <span id="js-time"></span> 秒</div>
  <button id="js-startBtn" class="btn">START</button>
</section>

<script src="https://tama-jp.github.io/tap/app.js"></script>

<!-- ウェブアプリマニフェストの読み込み -->
<link rel="manifest" href="https://tama-jp.github.io/tap/manifest.json">
<!-- ServiceWorkerの登録 -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('https://tama-jp.github.io/tap/sw.js').then(() => {
      console.log('登録成功');
    },() => {
      console.log('登録失敗');
    });
  }
</script>
</body>
</html>
